<div id="confirmation-container">
  @if (title; as title) {
    <h3 class="dialog-title">{{ title | translate }}</h3>
  }

  <div mat-dialog-content>
    @for (content of splitMessage; track content) {
      <p>{{ content }}</p>
    }
  </div>

  <div class="end-dialog-buttons">
    <button mat-stroked-button color="primary" (click)="onNoClick()">{{ 'No' | translate }}</button>
    <button mat-flat-button color="primary" [mat-dialog-close]="true" cdkFocusInitial>{{ 'Yes' | translate }}</button>
  </div>
</div>
