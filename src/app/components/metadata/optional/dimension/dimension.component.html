<div>
  <p class="metadata-header-physical">{{ 'Dimension' | translate }}</p>
  <app-outlined-input
    type="text"
    name="name"
    label="{{ 'Unit description (e.g. Width of base)' | translate }}"
    placeholder="{{ 'Enter a description' | translate }}"
    [formControl]="nameControl"
  />

  <div class="form-row">
    <app-outlined-input
      type="text"
      name="value"
      label="{{ 'Unit value' | translate }}"
      placeholder="{{ 'Enter a value' | translate }}"
      [formControl]="valueControl"
    />
    <app-outlined-input
      type="text"
      name="type"
      label="{{ 'Unit type' | translate }}"
      placeholder="{{ 'Enter a type' | translate }}"
      [formControl]="typeControl"
    />
  </div>
</div>

<div class="meta-button">
  <button
    mat-flat-button
    color="primary"
    [disabled]="!isDimensionValid"
    (click)="addNewDimensionData()"
  >
    {{ 'Add' | translate }}
  </button>
</div>

<app-optional-card-list [optionalData]="entity().dimensions" [propertyType]="'dimension'" />
